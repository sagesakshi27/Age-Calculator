<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Age Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <form onsubmit="event.preventDefault(); age();">
            <div class="base">
                <div class="enter">
                    <h4>Age Calculator</h4>
                </div>
                <div class="block">
                    <p class="title">Date</p>
                    <input type="number" id="date" placeholder="dd" min="1" max="31" required>
                </div>
                <div class="block">
                    <p class="title">Month</p>
                    <input type="number" id="month" placeholder="mm" min="1" max="12" required>
                </div>
                <div class="block">
                    <p class="title">Year</p>
                    <input type="number" id="year" placeholder="yyyy" min="1900" max="2100" required>
                </div>
            </div>
            <div class="base">
                <div class="enter">
                    <input type="submit" value="Calculate Age">
                </div>
            </div>
            <div id="age"></div>
        </form>
    </div>
    <script src="script.js"></script>
</body>
</html>
